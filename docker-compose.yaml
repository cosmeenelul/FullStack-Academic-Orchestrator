services:
  db:
    image: mysql:latest
    restart: always
    container_name: mysql-prof-dep-container
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: profesoriDepartamenteDB
    ports:
      - "3307:3306"
    volumes:
      - mysql-data-prof-dep:/var/lib/mysql
    networks:
      - prof-dep-network
    deploy:
      resources:
        limits:
          memory: 350M

  backend:
    image: cosmeenelul/backend-profesori:latest
    container_name: spring-backend-container
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: on-failure
    networks:
      - prof-dep-network
    deploy:
      resources:
        limits:
          memory: 450M

  frontend:
    image: cosmeenelul/frontend-profesori:latest
    container_name: react-vite-frontend
    ports:
      - "80:80"
    restart: always
    networks:
      - prof-dep-network
    deploy:
      resources:
        limits:
          memory: 200M

networks:
  prof-dep-network:
    driver: "bridge"
    name: prof-dep-network

volumes:
  mysql-data-prof-dep:
