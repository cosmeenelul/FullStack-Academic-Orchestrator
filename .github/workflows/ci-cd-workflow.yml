name: Java CI with Maven

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: mvn -B package -DskipTests --file backend/profesori-departamente/pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend/profesori-departamente
          file: ./backend/profesori-departamente/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/backend-profesori:latest

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/profesori-departamente/package-lock.json

      - name: Install Dependencies
        working-directory: frontend/profesori-departamente
        run: npm ci

      - name: Build project
        working-directory: frontend/profesori-departamente
        run: npm run build --if-present

      - name: Run tests
        working-directory: frontend/profesori-departamente
        run: npm test --if-present

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/profesori-departamente
          file: ./frontend/profesori-departamente/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/frontend-profesori:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Copy docker-compose to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "docker-compose.yaml"
          target: "/home/${{ secrets.LIGHTSAIL_USER }}/EDU-Manager-App"

      - name: Remote Docker Compose Up
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /home/${{ secrets.LIGHTSAIL_USER }}/EDU-Manager-App
            docker compose up -d --build
